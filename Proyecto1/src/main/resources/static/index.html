<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WarMetrics - Simulador de Dados</title>
    <link rel="stylesheet" href="/css/efectos.css">
    <link rel="stylesheet" href="/css/styles.css">
    
</head>
<body>

<header class="main-header">
    <div class="header-left">
        <div class="logo-text">WarMetrics <span>v1.0</span></div>
    </div>

    <div class="header-center">
        <a href="index.html" class="refresh-logo">
            <img src="/img/warDice.png" alt="WarMetrics Logo" id="web-icon">
        </a>
    </div>

    <div class="header-right">
        <nav class="header-menu">
            <span>Estado: </span>
            <span id="motor-status" class="status-badge">Verificando...</span>
        </nav>
    </div>
</header>

<div class="main-layout">
    <aside class="sidebar left-sidebar">
        <h3>Menú</h3>
        <ul>
            <li><a href="#" class="active">Simulador</a></li>
            <li><a href="#">Mis Unidades</a></li>
            <li><a href="#">Historial</a></li>
        </ul>
    </aside>

    <main class="content-area">
        <div class="simulator-card">
            <div class="card-header">
                <h2>Configuración de Ataque</h2>
                <p>Introduce los atributos de la unidad atacante y defensora.</p>
            </div>

            <div class="card-body">
                <fieldset class="step-group">
                    <legend>1. Fase de Impacto</legend>
                    <div class="input-grid">
                        <div class="field">
                            <label>Nº Ataques</label>
                            <input type="number" id="numAtaques" value="10" min="1">
                        </div>
                        <div class="field">
                            <label>Impactar a (X+)</label>
                            <input type="number" id="impactoX" value="3" min="1" max="6">
                        </div>
                        <div class="field">
                            <label>Repetir Impactos</label>
                            <select id="repeticionImpacto">
                                <option value="NONE">No repetir</option>
                                <option value="ONES">Repetir 1s</option>
                                <option value="ALL">Repetir fallos</option>
                            </select>
                        </div>
                        <div class="field">
                            <label>Regla Especial 6s</label>
                            <select id="especialSeisImpacto">
                                <option value="NONE">Ninguna</option>
                                <option value="EXTRA_HIT">Impacto Extra</option>
                                <option value="AUTO_WOUND">Herida Automática</option>
                            </select>
                        </div>
                    </div>
                </fieldset>

                <fieldset class="step-group">
                    <legend>2. Fase de Herida</legend>
                    <div class="input-grid">
                        <div class="field">
                            <label>Herir a (X+)</label>
                            <input type="number" id="herirX" value="4" min="2" max="6">
                        </div>
                        <div class="field">
                            <label>Daño por Ataque</label>
                            <input type="number" id="dañoPorAtaque" value="1" min="1">
                        </div>
                        <div class="field">
                            <label>Repetir Heridas</label>
                            <select id="repeticionHerir">
                                <option value="NONE">No repetir</option>
                                <option value="ONES">Repetir 1s</option>
                                <option value="ALL">Repetir fallos</option>
                            </select>
                        </div>
                        <div class="field checkbox-container">
                            <label class="checkbox-label">
                                <input type="checkbox" id="seisHeridaInsalvable">
                                <span>Heridas devastadoras</span>
                            </label>
                        </div>
                    </div>
                </fieldset>

                <fieldset class="step-group">
                    <legend>3. Salvaciones</legend>
                    <div class="input-grid">
                        <div class="field">
                            <label>Salv. Armadura (X+)</label>
                            <input type="number" id="salvacionX" value="5" min="2" max="7">
                        </div>
                        <div class="field">
                            <label>No Hay Dolor (X+)</label>
                            <input type="number" id="noHayDolorX" value="0">
                        </div>
                    </div>
                </fieldset>
            </div>

            <div class="card-footer">
                <button class="btn-primary" onclick="ejecutarSimulacion()">
                    Lanzar Dados y Calcular Medias
                </button>
            </div>
        </div>

        <div id="contenedorResultados" class="results-area"></div>
    </main>

    <aside class="sidebar right-sidebar">
        <h3>Resumen Rápido</h3>
        <div id="quick-stats">
            <p>No hay datos recientes.</p>
        </div>
    </aside>
</div>
<script src="/js/script.js"></script>
</body>
</html>
